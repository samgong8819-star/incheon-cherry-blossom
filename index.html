<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>인천 부평구 벚꽃 가로수 지도</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                   Roboto, "Noto Sans KR", Helvetica, Arial, sans-serif;
    }

    header {
      padding: 12px 16px;
      background: #f8f9fa;
      border-bottom: 1px solid #dee2e6;
    }

    header h1 {
      font-size: 18px;
      margin: 0;
    }

    header p {
      font-size: 13px;
      color: #555;
      margin: 4px 0 0;
    }

    #map {
      height: calc(100vh - 120px);
    }

    footer {
      padding: 10px 14px;
      font-size: 12px;
      color: #444;
      background: #ffffff;
      border-top: 1px solid #dee2e6;
      line-height: 1.4;
    }
  </style>
</head>
<body>

<header>
  <h1>🌸 인천 부평구 벚꽃 가로수 지도</h1>
  <p>공공데이터 기반 · 가로수 벚나무 위치 시각화</p>
</header>

<div id="map"></div>

<footer>
  <strong>데이터 범위 안내</strong><br>
  본 지도는 산림청 「도시숲 가로수 관리」 공공데이터 중<br>
  <strong>인천광역시 부평구</strong>에서 관리 중인 <strong>‘벚나무’</strong> 가로수를 기반으로 제작되었습니다.<br>
  행정 관리 특성상 실제 수종(왕벚나무 등)과 차이가 있을 수 있으며,
  지도는 참고용으로 활용해 주세요.<br>
  <br>
  ⓒ OpenStreetMap contributors · Visualization by GitHub Pages
</footer>

<!-- Leaflet JS -->
<script
  src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
  crossorigin=""
></script>

<script>
  // 지도 초기화 (부평구 중심)
  const map = L.map('map').setView([37.491, 126.724], 12);

  // 베이스맵
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  // ✅ 부평구 벚꽃 GeoJSON 불러오기
  fetch('incheon_cherry_bupyeong.geojson')
    .then(response => response.json())
    .then(data => {
      L.geoJSON(data, {
        pointToLayer: (feature, latlng) => {
          return L.circleMarker(latlng, {
            radius: 3,
            color: '#c2255c',
            fillColor: '#ffb3c1',
            fillOpacity: 0.8,
            weight: 1
          });
        },
        onEachFeature: (feature, layer) => {
          layer.bindPopup(`
            🌸 벚나무 가로수<br>
            ${feature.properties.시군구명}<br>
            흉고직경: ${feature.properties.수목흉고직경 || '-'}
          `);
        }
      }).addTo(map);
    })
    .catch(err => {
      console.error("GeoJSON 로드 실패:", err);
    });
</script>

</body>
</html>
