<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>인천 부평구 벚꽃 가로수 지도</title>

  <!-- 모바일 대응 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ========================= -->
  <!-- Leaflet (지도 기본 CSS) -->
  <!-- ========================= -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <!-- ========================= -->
  <!-- MarkerCluster (클러스터 CSS) -->
  <!-- ========================= -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
  />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
  />

  <!-- ========================= -->
  <!-- 페이지 스타일 -->
  <!-- ========================= -->
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                   Roboto, "Noto Sans KR", Helvetica, Arial, sans-serif;
    }

    header {
      padding: 12px 16px;
      background: #f8f9fa;
      border-bottom: 1px solid #dee2e6;
    }

    header h1 {
      font-size: 18px;
      margin: 0;
    }

    header p {
      font-size: 13px;
      color: #555;
      margin: 4px 0 0;
    }

    #map {
      height: calc(100vh - 120px);
    }

    footer {
      padding: 10px 14px;
      font-size: 12px;
      color: #444;
      background: #ffffff;
      border-top: 1px solid #dee2e6;
      line-height: 1.4;
    }
  </style>
</head>

<body>

<header>
  <h1>🌸 인천 부평구 벚꽃 가로수 지도</h1>
  <p>공공데이터 기반 · 가로수 벚나무 위치 시각화</p>
</header>

<div id="map"></div>

<footer>
  <strong>데이터 범위 안내</strong><br>
  본 지도는 산림청 「도시숲 가로수 관리」 공공데이터 중<br>
  <strong>인천광역시 부평구</strong>에서 관리 중인 <strong>‘벚나무’</strong> 가로수를 기반으로 제작되었습니다.<br>
  행정 관리 특성상 실제 수종(왕벚나무 등)과 차이가 있을 수 있으며,
  지도는 참고용으로 활용해 주세요.<br>
  <br>
  향후 인천 전역(서구·연수구·남동구 등)으로 확대될 예정입니다.<br>
  ⓒ OpenStreetMap contributors · Visualization by GitHub Pages
</footer>

<!-- ========================= -->
<!-- Leaflet JS -->
<!-- ========================= -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- ========================= -->
<!-- MarkerCluster JS -->
<!-- ========================= -->
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>
  // =========================
  // 지도 초기화 (부평구 중심)
  // =========================
  const map = L.map("map").setView([37.491, 126.724], 12);

  // 베이스맵
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "&copy; OpenStreetMap contributors"
  }).addTo(map);

  // =========================
  // 클러스터 그룹 설정
  // =========================
  const clusterGroup = L.markerClusterGroup({
    disableClusteringAtZoom: 16, // 이 줌 이상이면 개별 점
    maxClusterRadius: 50
  });

  // =========================
  // 부평구 벚꽃 GeoJSON 로드
  // =========================
  fetch("incheon_cherry_bupyeong.geojson")
    .then(response => response.json())
    .then(data => {
      const geoLayer = L.geoJSON(data, {
        pointToLayer: (feature, latlng) => {
          return L.circleMarker(latlng, {
            radius: 3,
            color: "#c2255c",
            fillColor: "#ffb3c1",
            fillOpacity: 0.8,
            weight: 1
          });
        },
        onEachFeature: (feature, layer) => {
          layer.bindPopup(`
            🌸 벚나무 가로수<br>
            ${feature.properties.시군구명}<br>
            흉고직경: ${feature.properties.수목흉고직경 || "-"}
          `);
        }
      });

      clusterGroup.addLayer(geoLayer);
      map.addLayer(clusterGroup);
    })
    .catch(error => {
      console.error("GeoJSON 로드 실패:", error);
    });
</script>

</body>
</html>
