<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>인천 벚꽃 지도 (가로수 왕벚나무)</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                   Roboto, "Noto Sans KR", sans-serif;
    }
    header {
      padding: 12px 16px;
      background: #f7f7f7;
      border-bottom: 1px solid #ddd;
    }
    #map {
      height: calc(100vh - 56px);
    }
    footer {
      position: absolute;
      bottom: 8px;
      left: 8px;
      background: white;
      padding: 6px 10px;
      font-size: 12px;
      border-radius: 4px;
      box-shadow: 0 0 4px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

<header>
  <strong>🌸 인천 벚꽃 지도</strong>
  <span style="color:#666; font-size:14px;">
    (가로수 왕벚나무 · 공공데이터 기반)
  </span>
</header>

<div id="map"></div>

<footer>
  데이터 출처: 산림청 도시숲 가로수 관리 데이터<br>
  본 지도는 참고용이며 실제 현장과 다를 수 있습니다.
</footer>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  // 지도 생성 (인천 중심)
  const map = L.map('map').setView([37.4563, 126.7052], 11);

  // OpenStreetMap 타일
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  // 임시 테스트용 벚꽃 마커 (나중에 GeoJSON으로 변경)
  L.circleMarker([37.4563, 126.7052], {
    radius: 6,
    color: '#d6336c',
    fillColor: '#ff8fb1',
    fillOpacity: 0.8
  })
  .addTo(map)
  .bindPopup("테스트 벚나무<br>인천 시청 근처");
</script>

</body>
</html>
